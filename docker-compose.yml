services:
  xhs-agent:
    image: ${XHS_AGENT_IMAGE:-ghcr.io/cnbatmoven/xhs-agent:latest}
    container_name: xhs-agent
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEFAULT_CDP_URL: ${DEFAULT_CDP_URL:-http://host.docker.internal:9222}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    extra_hosts:
      - "host.docker.internal:host-gateway"
